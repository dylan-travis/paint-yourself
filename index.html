<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DertCheep's Paint Yourself Into a Corner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <h1>DertCheep's Paint Yourself Into a Corner</h1>
      <p class="subtitle">
        Arrow keys move. Press <kbd>P</kbd> to paint your tile green. Paint every
        paintable tile except the one you are standing on. A Nova Scotian rival
        starts on the opposite side and repaints one square red every turn.
      </p>
      <canvas id="game" width="1100" height="760" aria-label="Game board"></canvas>
      <p id="status" class="status"></p>
      <p class="hint">Press <kbd>R</kbd> to reset.</p>
    </main>
    <script src="game.js"></script>
  </body>
</html>
